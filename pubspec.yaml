name: swipe_media_cleaner
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.3
  
  # Photo gallery access
  photo_manager: ^2.7.2
  
  # Permissions
  permission_handler: ^10.4.5
  
  # Intl for date formatting
  intl: ^0.18.1
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  
  # Riverpod code generation
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.6
  
  # Hive code generation
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
